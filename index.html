<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="favicon.ico">
<link rel="manifest" href="manifest.json">
<title>BMI Calculator</title>

<style>

:root {
  --background-color: #f2f2f2;
  --foreground-color: black;
  --input-background-color: #f2f2f2;
  --input-border-color: #e2e2e2;
  --input-foreground-color: black;
  --card-background-color: white;
  --range-background-color: #eef;
  --range-foreground-color: black;
  --result-background-color: #eef;
  --result-foreground-color: black;
  --error-color: #900;
  --underweight-color: hsl(210 100% 90%);
  --normalweight-color: hsl(120 100% 90%);
  --overweight-color: hsl(30 100% 90%);
  --obese-color: hsl(0 100% 90%);
}

@media (prefers-color-scheme: dark) {
  :root {
    --background-color: #1d1d20;
    --foreground-color: #f2f2f2;
    --input-background-color: #4d4d50;
    --input-border-color: #5d5d60;
    --input-foreground-color: #f2f2f2;
    --card-background-color: #2d2d30;
    --range-background-color: #3d3d40;
    --range-foreground-color: #f2f2f2;
    --result-background-color: black;
    --result-foreground-color: #f2f2f2;
    --error-color: #f55;
    --underweight-color: hsl(210 20% 25%);
    --normalweight-color: hsl(120 20% 25%);
    --overweight-color: hsl(30 20% 25%);
    --obese-color: hsl(0 20% 25%);
  }
}

body {
  font-family: system-ui, sans-serif;
  background: var(--background-color);
  color: var(--foreground-color);
  padding: clamp(1rem, 4vw, 2rem);
}

input[type="number"] {
  appearance: textfield;
}

input, select {
  background-color: var(--input-background-color);
  color: var(--input-foreground-color);
  border-color: var(--input-border-color);
  border-style: solid;
  border-radius: 5px;
}

.card {
  max-width: 480px;
  margin: auto;
  background: var(--card-background-color);
  color: var(--foreground-color);
  padding: 1.5rem;
  border-radius: 8px;
  box-shadow: 0 6px 16px rgba(0,0,0,0.1);
}

.field {
  display: grid;
  grid-template-rows: auto auto;
  margin-top: 1rem;
  min-height: 44px;
}

.field label {
  margin-bottom: 0.25rem;
  font-weight: 500;
}

.field input,
.field select {
  box-sizing: border-box;
  width: 100%;
}

.range {
  margin-top: 1.5rem;
  background: var(--range-background-color);
  color: var(--range-foreground-color);
  padding: 1rem;
  border-radius: 6px;
}

.range-grid {
  display: grid;
  grid-template-columns: 1fr auto;
  row-gap: 0.5rem;
  column-gap: 1rem;
  align-items: baseline;
}

/* labels */
.range-grid > div:nth-child(odd) {
  font-weight: 500;
}

/* and their values */
.range-grid > div:nth-child(even) {
  text-align: right;
  font-variant-numeric: tabular-nums;
}

.result {
  margin-top: 1.5rem;
  background: var(--result-background-color);
  color: var(--result-foreground-color);
  padding: 1rem;
  border-radius: 6px;
}

.result.underweight {
  background: var(--underweight-color);
}

.result.normalweight {
  background: var(--normalweight-color);
}

.result.overweight {
  background: var(--overweight-color);
}

.result.obese {
  background: var(--obese-color);
}

.result-grid {
  display: grid;
  grid-template-columns: 1fr auto;
  row-gap: 0.5rem;
  column-gap: 1rem;
  align-items: baseline;
}

/* labels */
.result-grid > div:nth-child(odd) {
  font-weight: 500;
}

/* and their values */
.result-grid > div:nth-child(even) {
  text-align: right;
  font-variant-numeric: tabular-nums;
}

.error {
  margin-top: 1rem;
  color: var(--error-color);
}
</style>
</head>

<body>

<div class="card">
<h1>BMI Calculator</h1>

<div class="field">
<label for="sex">Sex</label>
<select id="sex">
  <option value="male">Male</option>
  <option value="female">Female</option>
</select>
</div>

<div class="field">
<label for="age">Age</label>
<input type="number" id="age" min="0">
</div>

<div class="field">
<label for="height">Height (cm)</label>
<input type="number" id="height" min="0">
</div>

<div class="field">
<label for="weight">Weight (kg)</label>
<input type="number" id="weight" min="0">
</div>

<div class="field">
<label for="activity">Activity level</label>
<select id="activity">
  <option value="1.2">Sedentary</option>
  <option value="1.375">Light exercise</option>
  <option value="1.55">Moderate exercise</option>
  <option value="1.725">Heavy exercise</option>
  <option value="1.9">Athlete</option>
</select>
</div>

<div id="error" class="error">Please enable javascript.</div>

<div id="result" class="result" hidden>
  <div class="result-grid">
    <div>BMI</div>
    <div id="bmi-value"></div>

    <div>BMR</div>
    <div id="bmr-value"></div>

    <div>TDEE</div>
    <div id="tdee-value"></div>
  </div>
</div>

<div id="range" class="range" hidden>
  <div class="range-grid">
    <div>Healthy weight range</div>
    <div id="healthy-range"></div>

    <div>Reference (midpoint)</div>
    <div id="reference-weight"></div>
  </div>
</div>
</div>
</body>
<script type="text/javascript" src="bmir.js"></script>
</html>
